spring.datasource.url=jdbc:h2:mem:wordle;MODE=PostgreSQL;NON_KEYWORDS=value;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.cache.type=caffeine
spring.cache.cache-names=palavraDoDia,validacaoPalavra,palavrasDoDia
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=24h

logging.level.com.vitorsaucedo=DEBUG
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.SQL=DEBUG

cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
server.address=127.0.0.1