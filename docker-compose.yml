services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-termo}
      POSTGRES_USER: ${DB_USERNAME:-termo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-termo_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-termo_user} -d ${DB_NAME:-termo}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-termo}
      DB_USERNAME: ${DB_USERNAME:-termo_user}
      DB_PASSWORD: ${DB_PASSWORD:-termo_pass}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
